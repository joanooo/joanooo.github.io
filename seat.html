<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生座位排列系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #2c7a7b, #3d9a9b); color: white; padding: 18px 30px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header h1 { font-size: 1.5rem; font-weight: 700; }
    .container { display: flex; height: calc(100vh - 60px); }
    .sidebar { width: 340px; min-width: 300px; background: white; padding: 18px; overflow-y: auto; border-right: 1px solid #dde3ea; display: flex; flex-direction: column; gap: 16px; }
    .main { flex: 1; padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid #e8edf2; }
    .card-title { font-size: 0.85rem; font-weight: 700; color: #2c7a7b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #2c7a7b; color: white; }
    .btn-primary:hover { background: #235f60; }
    .btn-success { background: #38a169; color: white; }
    .btn-success:hover { background: #2f855a; }
    .btn-warning { background: #d69e2e; color: white; }
    .btn-warning:hover { background: #b7791f; }
    .btn-danger { background: #e53e3e; color: white; }
    .btn-danger:hover { background: #c53030; }
    .btn-gray { background: #718096; color: white; }
    .btn-gray:hover { background: #4a5568; }
    .btn-outline { background: white; color: #2c7a7b; border: 1.5px solid #2c7a7b; }
    .btn-outline:hover { background: #e6f7f7; }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
    .btn-full { width: 100%; justify-content: center; }
    label { font-size: 0.82rem; font-weight: 600; color: #555; display: block; margin-bottom: 4px; }
    input[type=text], select, textarea { width: 100%; padding: 8px 10px; border: 1.5px solid #dde3ea; border-radius: 6px; font-size: 0.85rem; transition: border 0.2s; background: #fafbfc; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2c7a7b; background: white; }
    textarea { resize: vertical; min-height: 80px; font-family: monospace; }
    .radio-group { display: flex; flex-direction: column; gap: 6px; }
    .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 10px; border-radius: 6px; border: 1.5px solid #e2e8f0; transition: all 0.2s; }
    .radio-item:hover { border-color: #2c7a7b; background: #f0fafa; }
    .radio-item.selected { border-color: #2c7a7b; background: #e6f7f7; }
    .radio-item input { accent-color: #2c7a7b; }
    .radio-item span { font-size: 0.85rem; font-weight: 500; }
    .classroom-grid { display: flex; flex-direction: column; gap: 6px; }
    .classroom-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; border: 1.5px solid #e2e8f0; cursor: pointer; transition: all 0.2s; }
    .classroom-item:hover { border-color: #2c7a7b; background: #f0fafa; }
    .classroom-item.selected { border-color: #2c7a7b; background: #e6f7f7; }
    .classroom-item input { accent-color: #2c7a7b; }
    .classroom-item .cls-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
    .classroom-item .cls-cap { font-size: 0.78rem; color: #888; }
    .student-count { font-size: 0.8rem; color: #888; margin-top: 4px; }
    .student-tags { display: flex; flex-wrap: wrap; gap: 4px; max-height: 100px; overflow-y: auto; margin-top: 6px; }
    .student-tag { background: #e6f7f7; color: #2c7a7b; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .cap-bar-wrap { margin-top: 6px; }
    .cap-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .cap-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .cap-bar-fill.ok { background: #38a169; }
    .cap-bar-fill.warn { background: #d69e2e; }
    .cap-bar-fill.over { background: #e53e3e; }
    .cap-text { font-size: 0.78rem; color: #666; margin-top: 3px; }
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid #e2e8f0; margin-bottom: 14px; }
    .tab { padding: 7px 14px; font-size: 0.83rem; font-weight: 600; color: #888; cursor: pointer; border-radius: 6px 6px 0 0; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: #2c7a7b; border-bottom-color: #2c7a7b; background: #f0fafa; }
    .tab:hover:not(.active) { color: #555; background: #f7f7f7; }
    .classroom-view { background: #f7fafc; border-radius: 10px; padding: 20px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
    .cls-header { text-align: center; margin-bottom: 16px; }
    .classroom-label { text-align: center; font-size: 1rem; font-weight: 700; color: #2c7a7b; padding: 6px 20px; background: white; border: 2px solid #2c7a7b; border-radius: 8px; display: inline-block; }
    .stage { background: linear-gradient(135deg, #2c7a7b, #3d9a9b); color: white; text-align: center; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 2px; }

    /* ── Generic seat ── */
    .seat { min-width: 52px; padding: 5px 6px; border-radius: 6px; border: 1.5px solid #b2d8d8; background: white; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 0.72rem; line-height: 1.3; position: relative; }
    .seat:hover { border-color: #2c7a7b; box-shadow: 0 2px 6px rgba(44,122,123,0.2); transform: translateY(-1px); }
    .seat.occupied { background: #e6f7f7; border-color: #2c7a7b; }
    .seat.quincunx { background: #fff8e1; border-color: #d69e2e; }
    .seat.empty { background: #f9f9f9; border-color: #ddd; color: #bbb; }
    .seat.dragging { opacity: 0.5; }
    .seat.drag-over { border: 2px dashed #2c7a7b; background: #d0f0f0; }
    .seat-num { font-size: 0.68rem; color: #aaa; }
    .seat-name { font-weight: 600; color: #2c7a7b; font-size: 0.75rem; word-break: break-all; }
    .seat-id { font-size: 0.65rem; color: #888; }

    /* ── EB106 fan layout ── */
    .eb106-layout { display: flex; flex-direction: column; align-items: center; gap: 0; }
    .eb106-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; width: 100%; }

    /* ── EL104 grid layout ── */
    .el104-layout { display: flex; gap: 12px; justify-content: center; align-items: flex-start; }
    .el104-col { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .el104-col-label { font-size: 0.72rem; font-weight: 700; color: #888; margin-bottom: 2px; text-align: center; }
    /* desk = 2-seat wide block */
    .desk { display: flex; gap: 4px; }
    .desk .seat { min-width: 48px; }
    /* single seat column */
    .single-col .seat { min-width: 44px; }
    /* spacer for missing rows */
    .row-spacer { height: 36px; }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.83rem; font-weight: 500; margin-bottom: 8px; }
    .alert-info { background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
    .alert-success { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
    .alert-warning { background: #fffaf0; color: #7b341e; border: 1px solid #fbd38d; }
    .alert-error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal h3 { font-size: 1.1rem; font-weight: 700; color: #2c7a7b; margin-bottom: 14px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .export-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .export-table th { background: #2c7a7b; color: white; padding: 8px 10px; text-align: left; }
    .export-table td { padding: 6px 10px; border-bottom: 1px solid #e2e8f0; }
    .export-table tr:hover td { background: #f0fafa; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #b2d8d8; border-radius: 3px; }
    .no-result { text-align: center; padding: 40px 20px; color: #aaa; font-size: 0.9rem; }
    .no-result .icon { font-size: 3rem; margin-bottom: 10px; }
    .flex-row { display: flex; gap: 8px; align-items: center; }
    .flex-row-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
    .mt-8 { margin-top: 8px; }
    @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid #dde3ea; } }
  </style>
</head>
<body>
<div class="header">
  <span>🎓</span>
  <h1>學生座位排列系統</h1>
</div>
<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="card">
      <div class="card-title">📋 學生名單</div>
      <label>貼上名單（每行一位，格式：學號 姓名）</label>
      <textarea id="studentInput" placeholder="例如：&#10;B11234 王小明&#10;B11235 李小華&#10;&#10;或只輸入姓名：&#10;王小明&#10;李小華"></textarea>
      <div class="flex-row mt-8">
        <button class="btn btn-primary btn-sm" onclick="parseStudents()">✅ 載入名單</button>
        <button class="btn btn-outline btn-sm" onclick="loadSampleData()">📝 範例資料</button>
        <button class="btn btn-gray btn-sm" onclick="clearStudents()">🗑 清除</button>
      </div>
      <div id="studentInfo" class="student-count"></div>
      <div id="studentTags" class="student-tags"></div>
    </div>
    <div class="card">
      <div class="card-title">🏫 選擇教室</div>
      <div class="classroom-grid" id="classroomList"></div>
      <div class="mt-8">
        <button class="btn btn-outline btn-sm" onclick="showAddClassroomModal()">➕ 新增教室</button>
      </div>
      <div id="capacityInfo" class="cap-bar-wrap" style="display:none">
        <div class="cap-bar"><div class="cap-bar-fill" id="capBarFill"></div></div>
        <div class="cap-text" id="capText"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">⚙️ 排列方式</div>
      <div class="radio-group">
        <label class="radio-item selected" id="opt-order" onclick="selectMode('order')">
          <input type="radio" name="mode" value="order" checked>
          <span>📊 依學號排列</span>
        </label>
        <label class="radio-item" id="opt-random" onclick="selectMode('random')">
          <input type="radio" name="mode" value="random">
          <span>🎲 隨機排列</span>
        </label>
        <label class="radio-item" id="opt-quincunx" onclick="selectMode('quincunx')">
          <input type="radio" name="mode" value="quincunx">
          <span>🌸 梅花座（隔位）</span>
        </label>
        <label class="radio-item" id="opt-name" onclick="selectMode('name')">
          <input type="radio" name="mode" value="name">
          <span>🔤 依姓名排列</span>
        </label>
      </div>
      <div class="mt-8">
        <button class="btn btn-primary btn-full" onclick="assignSeats()">🪑 開始排座位</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">💾 匯出</div>
      <div class="flex-row-wrap">
        <button class="btn btn-success btn-sm" onclick="exportCSV()">📥 匯出 CSV</button>
        <button class="btn btn-warning btn-sm" onclick="exportHTML()">🖨 列印 / HTML</button>
        <button class="btn btn-danger btn-sm" onclick="resetAll()">🔄 全部重設</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div id="alertArea"></div>
    <div class="tabs">
      <div class="tab active" id="tab-seating" onclick="switchTab('seating')">🪑 座位圖</div>
      <div class="tab" id="tab-list" onclick="switchTab('list')">📋 名單列表</div>
    </div>
    <div id="view-seating">
      <div id="classroomViews">
        <div class="no-result"><div class="icon">🏫</div><div>請先選擇教室並載入學生名單，<br>然後點擊「開始排座位」</div></div>
      </div>
    </div>
    <div id="view-list" style="display:none">
      <div class="card">
        <div class="card-title">📋 座位名單</div>
        <div id="listContent"><div class="no-result"><div class="icon">📋</div><div>尚未排列座位</div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Add Classroom Modal -->
<div class="modal-overlay" id="addClassroomModal">
  <div class="modal">
    <h3>➕ 新增教室</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label>教室名稱</label><input type="text" id="newClsName" placeholder="例如：EB107"></div>
      <div>
        <label>座位配置（每行一排，數字為各區塊座位數，逗號分隔）</label>
        <textarea id="newClsLayout" placeholder="例如：&#10;2,2,2&#10;3,3,3&#10;4,4,3" style="min-height:100px"></textarea>
        <div style="font-size:0.75rem;color:#888;margin-top:4px">每行代表一排，數字代表各區塊座位數</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('addClassroomModal')">取消</button>
      <button class="btn btn-primary" onclick="addClassroom()">新增</button>
    </div>
  </div>
</div>

<!-- Seat Edit Modal -->
<div class="modal-overlay" id="seatEditModal">
  <div class="modal">
    <h3>✏️ 編輯座位</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div id="seatEditInfo" style="font-size:0.85rem;color:#666;"></div>
      <div><label>指派學生</label>
        <select id="seatEditSelect"><option value="">-- 空座位 --</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('seatEditModal')">取消</button>
      <button class="btn btn-danger btn-sm" onclick="clearSeat()">清除座位</button>
      <button class="btn btn-primary" onclick="saveSeatEdit()">儲存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CLASSROOM DEFINITIONS
// ============================================================
/*
  EB106 – 扇形階梯教室
  每排 3 個區塊 (左/中/右)，排數 1-6
*/
const EB106 = {
  id: 'EB106', name: 'EB106', type: 'fan',
  layout: [
    { row:1, blocks:[2,2,2] },
    { row:2, blocks:[3,3,3] },
    { row:3, blocks:[4,4,3] },
    { row:4, blocks:[5,5,3] },
    { row:5, blocks:[6,6,3] },
    { row:6, blocks:[7,7,2] },
  ],
  sections: ['左區','中區','右區']
};

/*
  EL104 – 一般方形教室
  觀察圖片：
  ・最左欄（Col 0）：排 1 無座，排 2~7 各 1 個單人座 → 6 座
  ・Col 1~4（4 欄）：每欄排 1~9，每個位置是「雙人桌」(2 座)
    - Col 1: 排 1~9  → 9 桌 × 2 = 18 座
    - Col 2: 排 1~9  → 9 桌 × 2 = 18 座
    - Col 3: 排 1~9  → 9 桌 × 2 = 18 座
    - Col 4: 排 1~9  → 9 桌 × 2 = 18 座
  總計：6 + 72 = 78 座

  用 layout 表示：每 row 的 blocks 陣列
  blocks[i] 代表第 i 個區塊的座位數
  Col0 (single) | Col1 (desk=2) | Col2 (desk=2) | Col3 (desk=2) | Col4 (desk=2)
*/
const EL104 = {
  id: 'EL104', name: 'EL104', type: 'grid',
  // rows 1-9; col0 only exists for rows 2-7
  rows: 9,
  cols: [
    // col index 0: single seats, only rows 2-7
    { label:'側走道', type:'single', startRow:2, endRow:7 },
    // col 1-4: desk (2 seats each), rows 1-9
    { label:'A排', type:'desk', startRow:1, endRow:9 },
    { label:'B排', type:'desk', startRow:1, endRow:9 },
    { label:'C排', type:'desk', startRow:1, endRow:9 },
    { label:'D排', type:'desk', startRow:1, endRow:9 },
  ]
};

const BUILTIN_CLASSROOMS = [EB106, EL104];
let customClassrooms = [];
let selectedClassrooms = ['EB106'];
let currentMode = 'order';
let students = [];
let assignments = {};
let editingSeat = null;

function getAllClassrooms() { return [...BUILTIN_CLASSROOMS, ...customClassrooms]; }
function getSelectedClassrooms() { return getAllClassrooms().filter(c => selectedClassrooms.includes(c.id)); }

// ── capacity ──
function getClassroomCapacity(cls) {
  if (cls.type === 'fan' || cls.type === undefined) {
    return cls.layout.reduce((s, r) => s + r.blocks.reduce((a,b)=>a+b,0), 0);
  }
  if (cls.type === 'grid') {
    return cls.cols.reduce((sum, col) => {
      const count = col.endRow - col.startRow + 1;
      return sum + count * (col.type === 'desk' ? 2 : 1);
    }, 0);
  }
  return 0;
}
function getTotalCapacity() { return getSelectedClassrooms().reduce((s,c)=>s+getClassroomCapacity(c),0); }

// ── seat ID helpers ──
function getFanSeatId(clsId, row, bi, s) { return `${clsId}_R${row}_B${bi}_S${s}`; }
function getGridSeatId(clsId, col, row, s) { return `${clsId}_C${col}_R${row}_S${s}`; }

// ── enumerate all seats of a classroom in order ──
function enumerateSeats(cls) {
  const seats = [];
  if (cls.type === 'fan' || cls.type === undefined) {
    cls.layout.forEach(row => {
      row.blocks.forEach((count, bi) => {
        for (let s = 1; s <= count; s++) seats.push(getFanSeatId(cls.id, row.row, bi, s));
      });
    });
  } else if (cls.type === 'grid') {
    for (let row = 1; row <= cls.rows; row++) {
      cls.cols.forEach((col, ci) => {
        if (row < col.startRow || row > col.endRow) return;
        const seats2 = col.type === 'desk' ? 2 : 1;
        for (let s = 1; s <= seats2; s++) seats.push(getGridSeatId(cls.id, ci, row, s));
      });
    }
  }
  return seats;
}

// ── quincunx seat IDs ──
function enumerateQuincunxSeats(cls) {
  const all = enumerateSeats(cls);
  const odd = [], even = [];
  all.forEach((id, idx) => { (idx % 2 === 0 ? odd : even).push(id); });
  return [...odd, ...even];
}

// ============================================================
// INIT
// ============================================================
function init() { renderClassroomList(); updateCapacityInfo(); }

// ============================================================
// CLASSROOM LIST
// ============================================================
function renderClassroomList() {
  const container = document.getElementById('classroomList');
  container.innerHTML = '';
  getAllClassrooms().forEach(cls => {
    const cap = getClassroomCapacity(cls);
    const isSel = selectedClassrooms.includes(cls.id);
    const div = document.createElement('div');
    div.className = 'classroom-item' + (isSel ? ' selected' : '');
    div.innerHTML = `<input type="checkbox" ${isSel?'checked':''} onchange="toggleClassroom('${cls.id}',this.checked)">
      <span class="cls-name">${cls.name}</span><span class="cls-cap">容量 ${cap} 人</span>`;
    div.onclick = e => { if(e.target.tagName!=='INPUT'){const cb=div.querySelector('input');cb.checked=!cb.checked;toggleClassroom(cls.id,cb.checked);} };
    container.appendChild(div);
  });
}

function toggleClassroom(id, checked) {
  if (checked && !selectedClassrooms.includes(id)) selectedClassrooms.push(id);
  else if (!checked) selectedClassrooms = selectedClassrooms.filter(c=>c!==id);
  renderClassroomList(); updateCapacityInfo();
}

function updateCapacityInfo() {
  const total = getTotalCapacity(), sc = students.length;
  const info = document.getElementById('capacityInfo');
  if (!selectedClassrooms.length) { info.style.display='none'; return; }
  info.style.display = 'block';
  const pct = sc===0?0:Math.min(100,Math.round(sc/total*100));
  const fill = document.getElementById('capBarFill');
  fill.style.width = pct+'%';
  fill.className = 'cap-bar-fill '+(pct>100?'over':pct>80?'warn':'ok');
  document.getElementById('capText').textContent = `學生 ${sc} 人 / 總容量 ${total} 座 (${pct}%)`;
}

// ============================================================
// STUDENTS
// ============================================================
function parseStudents() {
  const raw = document.getElementById('studentInput').value.trim();
  if (!raw) { showAlert('請輸入學生名單','warning'); return; }
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l);
  students = lines.map((line,i)=>{
    const p = line.split(/\s+/);
    return p.length>=2 ? {id:p[0],name:p.slice(1).join(' '),index:i} : {id:String(i+1).padStart(3,'0'),name:p[0],index:i};
  });
  renderStudentTags(); updateCapacityInfo();

}

// ============================================================
// MODE
// ============================================================
function selectMode(mode) {
  currentMode=mode;
  ['order','random','quincunx','name'].forEach(m=>{
    const el=document.getElementById('opt-'+m);
    if(el) el.classList.toggle('selected',m===mode);
  });
}

// ============================================================
// ASSIGN SEATS
// ============================================================
function assignSeats() {
  if (!students.length) { showAlert('請先載入學生名單','warning'); return; }
  if (!selectedClassrooms.length) { showAlert('請先選擇教室','warning'); return; }
  const total = getTotalCapacity();
  if (students.length > total) { showAlert(`⚠️ 學生 ${students.length} 人超過總座位 ${total}，請增加教室`,'error'); return; }

  let sorted = [...students];
  if (currentMode==='order') sorted.sort((a,b)=>a.id.localeCompare(b.id));
  else if (currentMode==='random') { for(let i=sorted.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sorted[i],sorted[j]]=[sorted[j],sorted[i]];} }
  else if (currentMode==='name') sorted.sort((a,b)=>a.name.localeCompare(b.name,'zh-TW'));

  assignments = {};
  const clsList = getSelectedClassrooms();

  if (currentMode==='quincunx') {
    let allSeats=[];
    clsList.forEach(cls=>allSeats.push(...enumerateQuincunxSeats(cls)));
    sorted.forEach((st,i)=>{ if(i<allSeats.length) assignments[allSeats[i]]=st; });
  } else {
    let si=0;
    clsList.forEach(cls=>{
      enumerateSeats(cls).forEach(seatId=>{
        if(si<sorted.length) assignments[seatId]=sorted[si++];
      });
    });
  }

  renderClassroomViews(); renderListView(); updateCapacityInfo();
  showAlert(`✅ 已為 ${students.length} 位學生排好座位`,'success');
}

// ============================================================
// RENDER
// ============================================================
function renderClassroomViews() {
  const container = document.getElementById('classroomViews');
  container.innerHTML='';
  getSelectedClassrooms().forEach(cls=>{
    const div=document.createElement('div');
    div.className='classroom-view';
    if (cls.type==='grid') div.innerHTML=renderEL104HTML(cls);
    else div.innerHTML=renderFanHTML(cls);
    container.appendChild(div);
  });
  addSeatEvents();
}

// ── Fan (EB106) ──
function renderFanHTML(cls) {
  const blockLabels = cls.sections||cls.layout[0].blocks.map((_,i)=>`區塊${i+1}`);
  let h=`<div class="cls-header"><span class="classroom-label">🏫 ${cls.name}</span></div>`;
  h+=`<div class="stage">▲ 講台 / 黑板</div>`;
  h+=`<div class="eb106-layout">`;
  cls.layout.forEach(row=>{
    h+=`<div class="eb106-row">`;
    row.blocks.forEach((count,bi)=>{
      for(let s=1;s<=count;s++){
        const sid=getFanSeatId(cls.id,row.row,bi,s);
        h+=buildSeatHTML(sid,`排${row.row}-${blockLabels[bi]||bi+1}-${s}`);
      }
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

// ── Grid (EL104) ──
function renderEL104HTML(cls) {
  let h=`<div class="cls-header"><span class="classroom-label">🏫 ${cls.name}</span></div>`;
  h+=`<div class="stage">▲ 講台 / 黑板</div>`;
  h+=`<div class="el104-layout">`;

  cls.cols.forEach((col,ci)=>{
    h+=`<div class="el104-col ${col.type==='single'?'single-col':''}">`;
    h+=`<div class="el104-col-label">${col.label}</div>`;
    for(let row=1;row<=cls.rows;row++){
      if(row<col.startRow||row>col.endRow){
        // spacer to keep rows aligned
        h+=`<div class="row-spacer"></div>`;
      } else if(col.type==='desk'){
        h+=`<div class="desk">`;
        for(let s=1;s<=2;s++){
          const sid=getGridSeatId(cls.id,ci,row,s);
          h+=buildSeatHTML(sid,`排${row}-${col.label}-${s}`);
        }
        h+=`</div>`;
      } else {
        const sid=getGridSeatId(cls.id,ci,row,1);
        h+=buildSeatHTML(sid,`排${row}-${col.label}`);
      }
    }
    h+=`</div>`;
  });

  h+=`</div>`;
  return h;
}

function buildSeatHTML(seatId, label) {
  const student=assignments[seatId];
  const isQ=currentMode==='quincunx';
  let cls2='seat';
  if(student) cls2+=isQ&&isQuincunxSeat(seatId)?' quincunx':' occupied';
  else cls2+=' empty';
  return `<div class="${cls2}" data-seat-id="${seatId}" draggable="true" onclick="openSeatEdit('${seatId}')" title="${student?student.id+' '+student.name:'空座位'}">
    <div class="seat-num">${label}</div>
    ${student?`<div class="seat-name">${student.name}</div><div class="seat-id">${student.id}</div>`:'<div class="seat-name" style="color:#ccc">空</div>'}
  </div>`;
}

// simple quincunx check by global index
let _quincunxSet = new Set();
function isQuincunxSeat(seatId) { return _quincunxSet.has(seatId); }

// ── Drag & drop ──
function addSeatEvents() {
  let dragSrc=null;
  document.querySelectorAll('.seat').forEach(seat=>{
    seat.addEventListener('dragstart',function(e){dragSrc=this.dataset.seatId;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    seat.addEventListener('dragend',function(){this.classList.remove('dragging');document.querySelectorAll('.seat').forEach(s=>s.classList.remove('drag-over'));});
    seat.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag-over');});
    seat.addEventListener('dragleave',function(){this.classList.remove('drag-over');});
    seat.addEventListener('drop',function(e){e.preventDefault();this.classList.remove('drag-over');const t=this.dataset.seatId;if(dragSrc&&dragSrc!==t)swapSeats(dragSrc,t);});
  });
}

function swapSeats(id1,id2){
  const s1=assignments[id1],s2=assignments[id2];
  if(s1)assignments[id2]=s1;else delete assignments[id2];
  if(s2)assignments[id1]=s2;else delete assignments[id1];
  renderClassroomViews();renderListView();showAlert('✅ 座位已交換','success');
}

// ============================================================
// SEAT EDIT MODAL
// ============================================================
function openSeatEdit(seatId){
  editingSeat=seatId;
  const student=assignments[seatId];
  document.getElementById('seatEditInfo').innerHTML=`<strong>座位：</strong>${seatId}<br><strong>目前：</strong>${student?student.id+' '+student.name:'空座位'}`;
  const sel=document.getElementById('seatEditSelect');
  sel.innerHTML='<option value="">-- 空座位 --</option>';
  const assigned=new Set(Object.values(assignments).map(s=>s.id));
  students.forEach(s=>{
    const opt=document.createElement('option');
    opt.value=s.id;
    opt.textContent=`${s.id} ${s.name}`+(assigned.has(s.id)&&(!student||student.id!==s.id)?' (已分配)':'');
    if(student&&student.id===s.id)opt.selected=true;
    sel.appendChild(opt);
  });
  document.getElementById('seatEditModal').classList.add('show');
}

function saveSeatEdit(){
  const sid=document.getElementById('seatEditSelect').value;
  if(!sid){delete assignments[editingSeat];}
  else{
    const st=students.find(s=>s.id===sid);
    Object.keys(assignments).forEach(k=>{if(assignments[k]&&assignments[k].id===sid&&k!==editingSeat)delete assignments[k];});
    assignments[editingSeat]=st;
  }
  closeModal('seatEditModal');renderClassroomViews();renderListView();
}

function clearSeat(){delete assignments[editingSeat];closeModal('seatEditModal');renderClassroomViews();renderListView();}

// ============================================================
// LIST VIEW
// ============================================================
function renderListView(){
  const container=document.getElementById('listContent');
  if(!Object.keys(assignments).length){container.innerHTML='<div class="no-result"><div class="icon">📋</div><div>尚未排列座位</div></div>';return;}
  let rows=[];
  getSelectedClassrooms().forEach(cls=>{
    if(cls.type==='grid'){
      cls.cols.forEach((col,ci)=>{
        for(let row=col.startRow;row<=col.endRow;row++){
          const seats=col.type==='desk'?2:1;
          for(let s=1;s<=seats;s++){
            const sid=getGridSeatId(cls.id,ci,row,s);
            const st=assignments[sid];
            rows.push({classroom:cls.name,row,block:col.label,seat:s,studentId:st?st.id:'',studentName:st?st.name:''});
          }
        }
      });
    } else {
      cls.layout.forEach(row=>{
        row.blocks.forEach((count,bi)=>{
          for(let s=1;s<=count;s++){
            const sid=getFanSeatId(cls.id,row.row,bi,s);
            const st=assignments[sid];
            const block=(cls.sections||[])[bi]||`區塊${bi+1}`;
            rows.push({classroom:cls.name,row:row.row,block,seat:s,studentId:st?st.id:'',studentName:st?st.name:''});
          }
        });
      });
    }
  });
  let h=`<table class="export-table"><thead><tr><th>教室</th><th>排</th><th>區塊</th><th>座號</th><th>學號</th><th>姓名</th></tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr><td>${r.classroom}</td><td>${r.row}</td><td>${r.block}</td><td>${r.seat}</td><td>${r.studentId}</td><td>${r.studentName||'<span style="color:#ccc">空</span>'}</td></tr>`;});
  h+='</tbody></table>';
  container.innerHTML=h;
}

// ============================================================
// ADD CLASSROOM
// ============================================================
function showAddClassroomModal(){document.getElementById('newClsName').value='';document.getElementById('newClsLayout').value='';document.getElementById('addClassroomModal').classList.add('show');}

function addClassroom(){
  const name=document.getElementById('newClsName').value.trim();
  const raw=document.getElementById('newClsLayout').value.trim();
  if(!name){alert('請輸入教室名稱');return;}
  if(!raw){alert('請輸入座位配置');return;}
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l);
  const layout=lines.map((line,i)=>({row:i+1,blocks:line.split(',').map(n=>parseInt(n.trim())).filter(n=>!isNaN(n)&&n>0)})).filter(r=>r.blocks.length>0);
  if(!layout.length){alert('座位配置格式有誤');return;}
  const id=name.replace(/\s+/g,'_')+'_'+Date.now();
  customClassrooms.push({id,name,layout,type:'fan',sections:layout[0].blocks.map((_,i)=>`區塊${i+1}`)});
  closeModal('addClassroomModal');renderClassroomList();updateCapacityInfo();showAlert(`✅ 已新增教室 ${name}`,'success');
}

// ============================================================
// EXPORT
// ============================================================
function exportCSV(){
  if(!Object.keys(assignments).length){showAlert('請先排列座位','warning');return;}
  let csv='\uFEFF教室,排,區塊,座號,學號,姓名\n';
  getSelectedClassrooms().forEach(cls=>{
    if(cls.type==='grid'){
      cls.cols.forEach((col,ci)=>{
        for(let row=col.startRow;row<=col.endRow;row++){
          const seats=col.type==='desk'?2:1;
          for(let s=1;s<=seats;s++){
            const sid=getGridSeatId(cls.id,ci,row,s);
            const st=assignments[sid];
            csv+=`${cls.name},${row},${col.label},${s},${st?st.id:''},${st?st.name:''}\n`;
          }
        }
      });
    } else {
      cls.layout.forEach(row=>{
        row.blocks.forEach((count,bi)=>{
          for(let s=1;s<=count;s++){
            const sid=getFanSeatId(cls.id,row.row,bi,s);
            const st=assignments[sid];
            const block=(cls.sections||[])[bi]||`區塊${bi+1}`;
            csv+=`${cls.name},${row.row},${block},${s},${st?st.id:''},${st?st.name:''}\n`;
          }
        });
      });
    }
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='座位表.csv';a.click();URL.revokeObjectURL(url);
  showAlert('✅ CSV 已下載','success');
}

function resetAll(){

  students=[];assignments=[];selectedClassrooms=['EB106'];currentMode='order';
  document.getElementById('studentInput').value='';

function showAlert(msg,type='info'){
  const area=document.getElementById('alertArea');
  const div=document.createElement('div');div.className=`alert alert-${type}`;div.textContent=msg;
  area.innerHTML='';area.appendChild(div);setTimeout(()=>{if(div.parentNode)div.parentNode.removeChild(div);},3000);
}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function switchTab(tab){
  document.getElementById('view-seating').style.display=tab==='seating'?'':'none';
  document.getElementById('view-list').style.display=tab==='list'?'':'none';
  document.getElementById('tab-seating').classList.toggle('active',tab==='seating');
  document.getElementById('tab-list').classList.toggle('active',tab==='list');
}

document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');}));
init();
