<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>差假證明產生器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: '標楷體', 'DFKai-SB', serif;
      background: #f0f4f8;
      display: flex;
      gap: 0;
      min-height: 100vh;
    }

    /* ===== 左側面板 ===== */
    .panel {
      width: 360px;
      min-width: 320px;
      background: #1e293b;
      color: #e2e8f0;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .panel h1 {
      font-size: 17px;
      font-weight: bold;
      color: #fff;
      border-bottom: 2px solid #3b82f6;
      padding-bottom: 10px;
      font-family: sans-serif;
      letter-spacing: 1px;
    }
    .section-title {
      font-size: 12px;
      font-weight: bold;
      color: #94a3b8;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-family: sans-serif;
      text-transform: uppercase;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 13px; color: #cbd5e1; font-family: sans-serif; }
    input[type="text"], input[type="date"], input[type="time"] {
      padding: 9px 11px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      font-family: '標楷體', 'DFKai-SB', serif;
      width: 100%;
    }
    input:focus { outline: none; border-color: #3b82f6; }

    .time-row { display: flex; gap: 8px; }
    .time-row .form-group { flex: 1; }

    /* 人員勾選 */
    .member-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .member-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
      font-size: 14px;
      color: #e2e8f0;
      font-family: '標楷體', 'DFKai-SB', serif;
    }
    .member-checkbox:hover { border-color: #3b82f6; }
    .member-checkbox input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #3b82f6;
      cursor: pointer;
      flex-shrink: 0;
    }
    .select-all-row {
      display: flex; gap: 8px; margin-bottom: 4px;
    }
    .btn-sm {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: sans-serif;
    }
    .btn-select-all { background: #1d4ed8; color: white; }
    .btn-deselect { background: #475569; color: #e2e8f0; }

    /* 固定資訊區 */
    .fixed-info {
      background: #0f172a;
      border: 1px solid #1e40af;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #93c5fd;
      font-family: sans-serif;
      line-height: 1.8;
    }
    .fixed-info span { color: #fff; font-weight: bold; }

    /* 產生按鈕 */
    .btn-generate {
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      font-family: sans-serif;
      transition: opacity 0.2s;
      letter-spacing: 1px;
    }
    .btn-generate:hover { opacity: 0.88; }

    /* ===== 右側預覽 ===== */
    .preview-area {
      flex: 1;
      background: #e5e7eb;
      padding: 30px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .preview-toolbar {
      display: none;
      gap: 12px;
      align-items: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #374151;
      width: 100%;
      max-width: 794px;
    }
    .btn-print {
      padding: 9px 22px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: sans-serif;
      font-weight: bold;
    }
    .btn-print:hover { background: #047857; }

    /* A4 */
    .a4-page {
      width: 794px;
      background: white;
      padding: 60px 70px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border-radius: 4px;
    }

    /* 證明書 */
    .cert-title {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #1e3a5f;
      margin-bottom: 30px;
      padding-bottom: 14px;
      border-bottom: 2px solid #1e3a5f;
    }
    .cert-body {
      font-size: 17px;
      line-height: 2.6;
      color: #111;
      text-align: justify;
    }
    .cert-body .hl {
      font-weight: bold;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .cert-meta {
      margin-top: 28px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: #222;
      border-top: 1px dashed #aaa;
      padding-top: 16px;
    }
    .cert-sign {
      margin-top: 40px;
      text-align: right;
      font-size: 17px;
      color: #111;
      line-height: 2.2;
    }
    .cert-sign .dept {
      color: #1e3a5f;
      font-weight: bold;
    }

    .placeholder {
      color: #9ca3af;
      text-align: center;
      font-size: 16px;
      font-family: sans-serif;
      margin-top: 80px;
      line-height: 2;
    }

    /* 列印 */
    @media print {
      body { background: white; }
      .panel, .preview-toolbar { display: none !important; }
      .preview-area { background: white; padding: 0; }
      .a4-page { box-shadow: none; width: 100%; padding: 20mm 25mm; }
    }
  </style>
</head>
<body>

<!-- 左側面板 -->
<div class="panel">
  <h1>📋 差假證明產生器</h1>

  <!-- 固定資訊 -->
  <div>
    <div class="section-title">固定資訊</div>
    <div class="fixed-info">
      系所：<span>電機系</span><br>
      職稱：<span>助理教授</span><br>
      簽署人：<span>陳靜茹</span>
    </div>
  </div>

  <!-- 計畫編號 & 地點 -->
  <div>
    <div class="section-title">計畫資訊</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="form-group">
        <label>計畫編號</label>
        <input type="text" id="projectNo" value="114-851" placeholder="例：114-851">
      </div>
      <div class="form-group">
        <label>出差地點</label>
        <input type="text" id="location" value="嘉義縣" placeholder="例：嘉義縣">
      </div>
      <div class="form-group">
        <label>任務說明</label>
        <input type="text" id="task" value="現地勘查" placeholder="例：現地勘查、協助感測器安裝">
      </div>
    </div>
  </div>

  <!-- 日期時間 -->
  <div>
    <div class="section-title">日期 &amp; 時間</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="form-group">
        <label>出差日期</label>
        <input type="date" id="tripDate" value="2026-03-24">
      </div>
      <div class="time-row">
        <div class="form-group">
          <label>開始時間</label>
          <input type="time" id="timeStart" value="08:00">
        </div>
        <div class="form-group">
          <label>結束時間</label>
          <input type="time" id="timeEnd" value="18:00">
        </div>
      </div>
    </div>
  </div>

  <!-- 出差人員 -->
  <div>
    <div class="section-title">出差人員</div>
    <div class="select-all-row">
      <button class="btn-sm btn-select-all" onclick="selectAll(true)">全選</button>
      <button class="btn-sm btn-deselect" onclick="selectAll(false)">全不選</button>
    </div>
    <div class="member-grid" id="memberGrid"></div>
  </div>

  <button class="btn-generate" onclick="generate()">🖨️ 產生差假證明</button>
</div>

<!-- 右側預覽 -->
<div class="preview-area">
  <div class="preview-toolbar" id="toolbar">
    <button class="btn-print" onclick="window.print()">🖨️ 列印 / 存成 PDF</button>
  </div>
  <div id="previewContent">
    <div class="placeholder">⬅️ 填寫左側資訊後<br>點擊「產生差假證明」</div>
  </div>
</div>

<script>
  const DEFAULT_MEMBERS = ['石廷安','許凱睿','魏笠元','吳柏諺','林承翰','陳昭升','李昱緯','戴琮儒','林緯哲','劉顓賢','翁浚哲','鄭仁靖','張珍珠'];
  const WEEKDAYS = ['日','一','二','三','四','五','六'];

  // 建立人員勾選格
  function initMembers() {
    const grid = document.getElementById('memberGrid');
    grid.innerHTML = DEFAULT_MEMBERS.map(name => `
      <label class="member-checkbox">
        <input type="checkbox" value="${name}" checked>
        ${name}
      </label>
    `).join('');
  }

  function selectAll(checked) {
    document.querySelectorAll('#memberGrid input[type="checkbox"]')
      .forEach(cb => cb.checked = checked);
  }

  function getSelectedMembers() {
    return [...document.querySelectorAll('#memberGrid input[type="checkbox"]:checked')]
      .map(cb => cb.value);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '（未填日期）';
    const d = new Date(dateStr + 'T00:00:00');
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const wd = WEEKDAYS[d.getDay()];
    return `${y}/${m}/${day}（${wd}）`;
  }

  function generate() {
    const projectNo = document.getElementById('projectNo').value.trim() || '（未填）';
    const location  = document.getElementById('location').value.trim()  || '（未填）';
    const task      = document.getElementById('task').value.trim()      || '執行相關工作';
    const tripDate  = document.getElementById('tripDate').value;
    const timeStart = document.getElementById('timeStart').value || '08:00';
    const timeEnd   = document.getElementById('timeEnd').value   || '18:00';
    const members   = getSelectedMembers();

    if (members.length === 0) { alert('請至少勾選一位出差人員！'); return; }

    const memberStr = members.join('、');
    const dateStr   = formatDate(tripDate);
    const timeStr   = `${timeStart}〜${timeEnd}`;

    const html = `
      <div class="a4-page">
        <div class="cert-title">出　差　證　明　書</div>
        <div class="cert-body">
          &emsp;&emsp;為協助校內計畫編號：<span class="hl">${projectNo}</span>，因此派遣學生
          <span class="hl">${memberStr}</span>
          赴<span class="hl">${location}</span><span class="hl">${task}</span>。
          以此證明利出差的學生作為差假申請之用。
        </div>
        <div class="cert-meta">
          <span> 日期：<strong>${dateStr}</strong></span>
          <span> 時間：<strong>${timeStr}</strong></span>
        </div>
        <div class="cert-sign">
          <span class="dept">電機系</span>&emsp;助理教授&emsp;陳靜茹
        </div>
      </div>
    `;

    document.getElementById('previewContent').innerHTML = html;
    document.getElementById('toolbar').style.display = 'flex';
  }

  initMembers();
</script>
</body>
</html>
