<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joanoo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* 背景光暈 */
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: -150px; left: -150px;
      animation: drift1 12s ease-in-out infinite;
    }
    .glow-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(236,72,153,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 15s ease-in-out infinite;
    }
    .glow-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(34,211,238,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: drift3 10s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, 30px); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, -40px); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }

    /* 主體 */
    .center {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* 主標題 */
    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #e0e7ff 30%,
        #a5b4fc 55%,
        #818cf8 75%,
        #6366f1 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
    }

    /* 反光效果 */
    .main-title::after {
      content: 'Joanoo';
      position: absolute;
      top: 0; left: 0;
      background: linear-gradient(
        135deg,
        transparent 0%,
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.15) 50%,
        transparent 60%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      pointer-events: none;
    }

    /* 副標語 */
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(14px, 2.5vw, 20px);
      font-weight: 300;
      font-style: italic;
      color: rgba(148, 163, 184, 0.7);
      letter-spacing: 6px;
      margin-top: 8px;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* 分隔線 */
    .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #6366f1, transparent);
      margin: 28px auto;
      animation: fadeUp 1.2s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* 工具連結 */
    .tools {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1.2s 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .tool-link {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.6);
      text-decoration: none;
      padding: 10px 22px;
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 40px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      background: rgba(99,102,241,0.04);
    }
    .tool-link:hover {
      color: #a5b4fc;
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.1);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 底部 */
    .footer-dot {
      position: fixed;
      bottom: 24px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(71, 85, 105, 0.5);
      text-transform: uppercase;
      animation: fadeUp 1.2s 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @media (max-width: 480px) {
      .subtitle { letter-spacing: 3px; }
      .tool-link { font-size: 11px; padding: 8px 16px; letter-spacing: 1.5px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>

  <div class="center">
    <h1 class="main-title">Joanoo</h1>
    <p class="subtitle">tools &amp; utilities</p>
    <div class="line"></div>
    <div class="tools">
      <a href="officialleave.html" class="tool-link"> 差假證明</a>
      <a href="seat.html" class="tool-link"> 乖乖坐好</a>
      <a href="#" class="tool-link" style="opacity:0.35;pointer-events:none;">即將推出</a>
    </div>
  </div>

  <p class="footer-dot">© 2026 Joanoo</p>

</body>
</html>
