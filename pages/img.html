<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片工具箱</title>
  
  <!-- 引入共用與專屬 CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tools/img.css">
</head>
<body>

<div class="topbar">
  <div class="logo">🖼️ <span>圖片工具箱</span></div>
  <span class="topbar-sub">貼上截圖 → 一鍵下載 ／ 去背 ／ 轉檔</span>
</div>

<div class="main">

  <!-- ── 貼上 / 上傳區 ── -->
  <div class="paste-zone" id="pasteZone" tabindex="0"
    onclick="triggerFileInput()"
    ondragover="event.preventDefault();document.getElementById('pasteZone').classList.add('drag')"
    ondragleave="document.getElementById('pasteZone').classList.remove('drag')"
    ondrop="handleDrop(event)">
    <div id="emptyState">
      <div class="paste-icon">📋</div>
      <div class="paste-title">貼上截圖或圖片</div>
      <div class="paste-hint">
        按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 貼上剪貼簿圖片<br>
        或點擊此處上傳 ／ 拖曳圖片檔案<br>
        <span style="font-size:11px;color:var(--text3);">支援 JPG、PNG、GIF、WebP、BMP、SVG</span>
      </div>
    </div>
    <img id="previewImg" alt="預覽">
    <div class="img-info-bar" id="imgInfoBar">
      <span id="imgSize">—</span>
      <span id="imgDim">—</span>
      <span id="imgType">—</span>
      <button class="clear-btn" onclick="clearImage(event)">✕ 清除</button>
    </div>
  </div>

  <!-- ── 工具列 ── -->
  <div class="toolbar" id="toolbar">

    <!-- 下載 -->
    <div class="tool-card">
      <div class="tool-card-title">⬇️ 快速下載</div>
      <div class="tool-card-desc">一鍵將目前圖片下載到本機</div>
      <button class="btn btn-blue" onclick="quickDownload()">⬇️ 立即下載</button>
    </div>

    <!-- 去背 -->
    <div class="tool-card">
      <div class="tool-card-title">✂️ 去背</div>
      <div class="threshold-row">
        <span>容差</span>
        <input type="range" id="thresholdRange" min="0" max="120" value="30"
          oninput="document.getElementById('thresholdVal').textContent=this.value">
        <span id="thresholdVal">30</span>
      </div>
      <div style="font-size:11px;color:var(--text3);">替換背景色：</div>
      <div class="bg-options" id="bgSwatches"></div>
      <button class="btn btn-purple" onclick="removeBG()">✂️ 執行去背</button>
    </div>

    <!-- 轉檔 -->
    <div class="tool-card">
      <div class="tool-card-title">🔄 轉檔</div>
      <div class="tool-card-desc">選擇輸出格式</div>
      <div class="fmt-row" id="fmtRow"></div>
      <div class="threshold-row" id="qualityRow">
        <span>品質</span>
        <input type="range" id="qualityRange" min="10" max="100" value="92"
          oninput="document.getElementById('qualityVal').textContent=this.value+'%'">
        <span id="qualityVal">92%</span>
      </div>
      <button class="btn btn-orange" onclick="convertFormat()">🔄 轉換並下載</button>
    </div>

    <!-- 縮放 -->
    <div class="tool-card">
      <div class="tool-card-title">📏 縮放</div>
      <div class="resize-row">
        <label>W</label>
        <input type="number" id="resizeW" placeholder="寬" min="1" oninput="syncResize('w')">
        <button class="lock-btn locked" id="lockBtn" onclick="toggleLock()">🔒</button>
        <label>H</label>
        <input type="number" id="resizeH" placeholder="高" min="1" oninput="syncResize('h')">
      </div>
      <div class="fmt-row">
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(50)">50%</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(75)">75%</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(100)">原尺寸</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(200)">2×</button>
      </div>
      <button class="btn btn-green" onclick="resizeAndDownload()">📏 縮放並下載</button>
    </div>

  </div>

  <!-- ── 結果預覽 ── -->
  <div class="result-row" id="resultRow"></div>

</div>

<!-- 進度遮罩 -->
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text" id="processingText">處理中…</div>
</div>

<canvas id="workCanvas"></canvas>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadFile(event)">
<div class="toast" id="toast"></div>

<!-- 引入獨立的 JavaScript -->
<script src="../js/tools/img.js" defer></script>

</body>
</html>
