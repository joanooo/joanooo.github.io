<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joanoo Convert</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入共用與專屬 CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/tools/topdf.css">
</head>
<body class="text-white min-h-screen relative">
  <!-- 背景光暈裝飾 -->
  <div class="glow-line w-40 top-24 left-10 rotate-12"></div>
  <div class="glow-line w-32 bottom-24 left-20 -rotate-45"></div>
  <div class="glow-line w-44 top-1/2 right-10 -rotate-12"></div>

  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <section class="w-full max-w-5xl text-center">
      <!-- 標題區 -->
      <div class="mb-8">
        <h1 class="title-gradient text-7xl md:text-8xl font-black tracking-tight leading-none" style="font-family: Georgia, serif;">
          Joanoo
        </h1>
        <p class="mt-3 text-sm md:text-base tracking-[0.35em] text-slate-400 italic">
          file convert utility
        </p>
        <div class="w-16 h-px bg-indigo-400/50 mx-auto mt-5"></div>
      </div>

      <!-- 工具切換標籤 -->
      <div id="toolTabs" class="flex flex-wrap justify-center gap-3 mb-10">
        <button class="tool-chip active rounded-full px-5 py-3 text-sm" data-tool="convert-pdf">轉 PDF</button>
        <button class="tool-chip rounded-full px-5 py-3 text-sm" data-tool="merge-pdf">合併 PDF</button>
        <button class="tool-chip rounded-full px-5 py-3 text-sm" data-tool="compress-pdf">壓縮 PDF</button>
      </div>

      <!-- 主要操作面板 -->
      <div class="panel rounded-3xl max-w-2xl mx-auto p-6 md:p-8 text-left">
        <div class="dropzone rounded-2xl p-8 md:p-10 text-center">
          <div class="text-5xl mb-4">✦</div>
          <h2 id="toolTitle" class="text-2xl md:text-3xl font-semibold text-slate-100 text-center">轉 PDF</h2>
          <p id="toolDesc" class="text-slate-400 mt-3 text-sm md:text-base text-center">
            上傳 Word、PPT 或圖片，快速轉成 PDF
          </p>

          <input id="fileInput" type="file" class="hidden" />
          <div id="dropArea" class="mt-6 cursor-pointer rounded-2xl border border-transparent px-4 py-8 hover:border-indigo-400/30 transition">
            <button id="pickFileBtn" class="rounded-full px-6 py-3 bg-indigo-500/90 hover:bg-indigo-400 text-white font-medium transition shadow-lg shadow-indigo-500/20">
              選擇檔案
            </button>
            <p id="dropHint" class="text-slate-500 text-sm mt-4">或拖曳檔案到這裡</p>
          </div>

          <!-- 檔案資訊 -->
          <div id="fileInfo" class="hidden mt-6 rounded-2xl field px-4 py-4 text-left">
            <div class="flex items-center justify-between gap-4">
              <div>
                <p id="fileName" class="font-medium text-slate-100"></p>
                <p id="fileMeta" class="text-xs text-slate-400 mt-1"></p>
              </div>
              <button id="removeFileBtn" class="text-sm text-rose-300 hover:text-rose-200">移除</button>
            </div>
          </div>

          <!-- 輸出格式 -->
          <div id="outputWrap" class="mt-6">
            <label class="block text-xs tracking-[0.25em] text-slate-500 mb-2">OUTPUT</label>
            <select id="outputFormat" class="field w-full rounded-2xl px-4 py-3 text-sm">
              <option value="pdf">PDF</option>
            </select>
          </div>

          <!-- 轉換按鈕 -->
          <button id="convertBtn" class="mt-6 w-full rounded-2xl py-3 bg-white text-black font-semibold hover:bg-slate-200 transition">
            開始轉換
          </button>

          <!-- 進度條 -->
          <div id="progressWrap" class="hidden mt-6">
            <div class="flex items-center justify-between text-sm text-slate-400 mb-2">
              <span id="progressText">處理中...</span>
              <span id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-white/5 rounded-full h-2 overflow-hidden">
              <div id="progressBar" class="h-2 rounded-full bg-indigo-400" style="width: 0%"></div>
            </div>
          </div>

          <!-- 結果與下載 -->
          <div id="resultWrap" class="hidden mt-6 rounded-2xl border border-emerald-400/20 bg-emerald-500/10 p-4 text-left">
            <p id="resultText" class="text-emerald-200 font-medium">轉換完成</p>
            <a id="downloadLink" href="#" download class="inline-block mt-3 rounded-full bg-white text-black px-5 py-2 font-medium hover:bg-slate-200 transition">
              下載檔案
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 引入獨立的 JavaScript -->
  <script src="../js/tools/topdf.js" defer></script>
</body>
</html>
