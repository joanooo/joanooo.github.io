<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖片工具箱</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3347; --accent: #5b8dee; --accent2: #a78bfa;
      --green: #34d399; --red: #f87171; --yellow: #fbbf24;
      --text: #e8eaf6; --text2: #8892b0; --text3: #4a5568;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── 頂部 ── */
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 28px; display: flex; align-items: center; gap: 14px;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-sub { font-size: 12px; color: var(--text2); }

    /* ── 主體 ── */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 20px; gap: 24px; }

    /* ── 貼上區 ── */
    .paste-zone {
      width: 100%; max-width: 860px;
      border: 2px dashed var(--border); border-radius: 18px;
      background: var(--surface); padding: 48px 24px;
      text-align: center; cursor: pointer;
      transition: all 0.25s; position: relative; outline: none;
    }
    .paste-zone:hover, .paste-zone.drag { border-color: var(--accent); background: rgba(91,141,238,0.05); }
    .paste-zone.has-image { padding: 0; border-style: solid; border-color: var(--border); overflow: hidden; }
    .paste-icon { font-size: 52px; margin-bottom: 14px; }
    .paste-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .paste-hint { font-size: 13px; color: var(--text2); line-height: 1.8; }
    .paste-hint kbd {
      display: inline-block; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 8px; font-size: 12px; font-family: monospace;
      color: var(--accent); margin: 0 2px;
    }
    #previewImg {
      display: none; width: 100%; max-height: 480px;
      object-fit: contain; background: repeating-conic-gradient(#1e2235 0% 25%, #161925 0% 50%) 0 0 / 20px 20px;
      border-radius: 16px;
    }
    .img-info-bar {
      display: none; background: var(--surface2); padding: 8px 16px;
      font-size: 12px; color: var(--text2); border-top: 1px solid var(--border);
      display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    }
    .img-info-bar span { color: var(--text); font-weight: 600; }
    .clear-btn {
      margin-left: auto; background: none; border: 1px solid var(--border);
      color: var(--text2); border-radius: 6px; padding: 3px 10px;
      cursor: pointer; font-size: 12px; transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── 工具列 ── */
    .toolbar {
      width: 100%; max-width: 860px;
      display: none; gap: 12px; flex-wrap: wrap;
    }
    .toolbar.visible { display: flex; }

    .tool-card {
      flex: 1; min-width: 180px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 16px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color 0.2s;
    }
    .tool-card:hover { border-color: var(--accent); }
    .tool-card-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .tool-card-desc { font-size: 12px; color: var(--text3); line-height: 1.6; }

    /* ── 按鈕 ── */
    .btn {
      padding: 10px 16px; border: none; border-radius: 9px;
      cursor: pointer; font-size: 13px; font-weight: 700;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .btn-blue   { background: linear-gradient(135deg,#3b82f6,#6366f1); color: #fff; }
    .btn-green  { background: linear-gradient(135deg,#059669,#34d399); color: #fff; }
    .btn-purple { background: linear-gradient(135deg,#7c3aed,#a78bfa); color: #fff; }
    .btn-orange { background: linear-gradient(135deg,#ea580c,#fbbf24); color: #fff; }
    .btn-red    { background: linear-gradient(135deg,#dc2626,#f87171); color: #fff; }
    .btn-ghost  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 7px; }

    /* ── 格式選擇 ── */
    .fmt-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .fmt-btn {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text2); cursor: pointer;
      font-size: 12px; font-weight: 700; transition: all 0.15s;
    }
    .fmt-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .fmt-btn.active { border-color: var(--accent2); background: rgba(167,139,250,0.15); color: var(--accent2); }

    /* ── 去背設定 ── */
    .bg-options { display: flex; gap: 6px; flex-wrap: wrap; }
    .bg-swatch {
      width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.15s; flex-shrink: 0;
    }
    .bg-swatch:hover, .bg-swatch.active { border-color: var(--accent); }
    .bg-swatch.transparent {
      background: repeating-conic-gradient(#444 0% 25%, #222 0% 50%) 0 0 / 12px 12px;
    }
    .threshold-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
    .threshold-row input[type=range] { flex: 1; accent-color: var(--accent2); }
    .threshold-row span { color: var(--accent2); font-weight: 700; min-width: 28px; }

    /* ── 縮放 ── */
    .resize-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .resize-row input[type=number] {
      width: 72px; padding: 6px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 13px; text-align: center;
    }
    .resize-row input:focus { outline: none; border-color: var(--accent); }
    .resize-row label { font-size: 12px; color: var(--text2); }
    .lock-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; cursor: pointer; color: var(--text2); font-size: 14px; transition: all 0.15s; }
    .lock-btn.locked { border-color: var(--accent); color: var(--accent); }

    /* ── 進度遮罩 ── */
    .processing-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    }
    .processing-overlay.show { display: flex; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .processing-text { font-size: 16px; color: var(--text); font-weight: 600; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 22px; font-size: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); opacity: 0;
      transition: all 0.3s; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); }
    .toast.error   { border-color: var(--red); }

    /* ── 結果預覽 ── */
    .result-row {
      width: 100%; max-width: 860px;
      display: none; gap: 12px; flex-wrap: wrap;
    }
    .result-row.visible { display: flex; }
    .result-card {
      flex: 1; min-width: 200px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
    }
    .result-card-header { padding: 10px 14px; background: var(--surface2); font-size: 12px; font-weight: 700; color: var(--text2); display: flex; align-items: center; justify-content: space-between; }
    .result-card img {
      width: 100%; max-height: 200px; object-fit: contain;
      background: repeating-conic-gradient(#1e2235 0% 25%, #161925 0% 50%) 0 0 / 16px 16px;
    }
    .result-card-footer { padding: 10px 14px; display: flex; gap: 8px; }

    /* ── 隱藏 canvas ── */
    #workCanvas { display: none; }

    @media (max-width: 600px) {
      .tool-card { min-width: 100%; }
      .topbar { padding: 12px 16px; }
      .main { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">🖼️ <span>圖片工具箱</span></div>
  <span class="topbar-sub">貼上截圖 → 一鍵下載 ／ 去背 ／ 轉檔</span>
</div>

<div class="main">

  <!-- ── 貼上 / 上傳區 ── -->
  <div class="paste-zone" id="pasteZone" tabindex="0"
    onclick="triggerFileInput()"
    ondragover="event.preventDefault();document.getElementById('pasteZone').classList.add('drag')"
    ondragleave="document.getElementById('pasteZone').classList.remove('drag')"
    ondrop="handleDrop(event)">
    <div id="emptyState">
      <div class="paste-icon">📋</div>
      <div class="paste-title">貼上截圖或圖片</div>
      <div class="paste-hint">
        按 <kbd>Ctrl</kbd>+<kbd>V</kbd> 貼上剪貼簿圖片<br>
        或點擊此處上傳 ／ 拖曳圖片檔案<br>
        <span style="font-size:11px;color:var(--text3);">支援 JPG、PNG、GIF、WebP、BMP、SVG</span>
      </div>
    </div>
    <img id="previewImg" alt="預覽">
    <div class="img-info-bar" id="imgInfoBar">
      <span id="imgSize">—</span>
      <span id="imgDim">—</span>
      <span id="imgType">—</span>
      <button class="clear-btn" onclick="clearImage(event)">✕ 清除</button>
    </div>
  </div>

  <!-- ── 工具列 ── -->
  <div class="toolbar" id="toolbar">

    <!-- 下載 -->
    <div class="tool-card">
      <div class="tool-card-title">⬇️ 快速下載</div>
      <div class="tool-card-desc">一鍵將目前圖片下載到本機</div>
      <button class="btn btn-blue" onclick="quickDownload()">⬇️ 立即下載</button>
    </div>

    <!-- 去背 -->
    <div class="tool-card">
      <div class="tool-card-title">✂️ 去背</div>
      <div class="threshold-row">
        <span>容差</span>
        <input type="range" id="thresholdRange" min="0" max="120" value="30"
          oninput="document.getElementById('thresholdVal').textContent=this.value">
        <span id="thresholdVal">30</span>
      </div>
      <div style="font-size:11px;color:var(--text3);">替換背景色：</div>
      <div class="bg-options" id="bgSwatches"></div>
      <button class="btn btn-purple" onclick="removeBG()">✂️ 執行去背</button>
    </div>

    <!-- 轉檔 -->
    <div class="tool-card">
      <div class="tool-card-title">🔄 轉檔</div>
      <div class="tool-card-desc">選擇輸出格式</div>
      <div class="fmt-row" id="fmtRow"></div>
      <div class="threshold-row" id="qualityRow">
        <span>品質</span>
        <input type="range" id="qualityRange" min="10" max="100" value="92"
          oninput="document.getElementById('qualityVal').textContent=this.value+'%'">
        <span id="qualityVal">92%</span>
      </div>
      <button class="btn btn-orange" onclick="convertFormat()">🔄 轉換並下載</button>
    </div>

    <!-- 縮放 -->
    <div class="tool-card">
      <div class="tool-card-title">📐 縮放</div>
      <div class="resize-row">
        <label>W</label>
        <input type="number" id="resizeW" placeholder="寬" min="1" oninput="syncResize('w')">
        <button class="lock-btn locked" id="lockBtn" onclick="toggleLock()">🔒</button>
        <label>H</label>
        <input type="number" id="resizeH" placeholder="高" min="1" oninput="syncResize('h')">
      </div>
      <div class="fmt-row">
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(50)">50%</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(75)">75%</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(100)">原尺寸</button>
        <button class="btn btn-sm btn-ghost" onclick="setResizePercent(200)">2×</button>
      </div>
      <button class="btn btn-green" onclick="resizeAndDownload()">📐 縮放並下載</button>
    </div>

  </div>

  <!-- ── 結果預覽 ── -->
  <div class="result-row" id="resultRow"></div>

</div>

<!-- 進度遮罩 -->
<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
  <div class="processing-text" id="processingText">處理中…</div>
</div>

<canvas id="workCanvas"></canvas>
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="loadFile(event)">
<div class="toast" id="toast"></div>

<script>
  // ══ 狀態 ══
  let currentImage = null;   // HTMLImageElement
  let currentBlob  = null;   // 原始 Blob
  let currentName  = 'image';
  let currentType  = 'image/png';
  let origW = 0, origH = 0;
  let lockRatio = true;
  let selectedFmt = 'png';

  const BG_COLORS = [
    { label:'透明', value:'transparent', cls:'transparent' },
    { label:'白',   value:'#ffffff', style:'background:#ffffff' },
    { label:'黑',   value:'#000000', style:'background:#000000' },
    { label:'紅',   value:'#ef4444', style:'background:#ef4444' },
    { label:'藍',   value:'#3b82f6', style:'background:#3b82f6' },
    { label:'綠',   value:'#22c55e', style:'background:#22c55e' },
    { label:'黃',   value:'#fbbf24', style:'background:#fbbf24' },
  ];
  let selectedBG = 'transparent';

  const FORMATS = ['PNG','JPEG','WEBP','BMP'];

  // ══ 初始化 ══
  function init() {
    // 去背色塊
    document.getElementById('bgSwatches').innerHTML = BG_COLORS.map(c => `
      <div class="bg-swatch ${c.cls||''} ${c.value==='transparent'?'active':''}"
        style="${c.style||''}" title="${c.label}"
        onclick="selectBG('${c.value}',this)"></div>`).join('');

    // 格式按鈕
    document.getElementById('fmtRow').innerHTML = FORMATS.map(f => `
      <div class="fmt-btn ${f==='PNG'?'active':''}" onclick="selectFmt('${f.toLowerCase()}',this)">${f}</div>`).join('');

    // 貼上監聽
    document.addEventListener('paste', handlePaste);
    document.getElementById('pasteZone').addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') triggerFileInput();
    });
  }

  // ══ 貼上 ══
  function handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const blob = item.getAsFile();
        loadBlob(blob, 'clipboard-image');
        break;
      }
    }
  }

  // ══ 拖曳 ══
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('pasteZone').classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadBlob(file, file.name);
  }

  // ══ 檔案選擇 ══
  function triggerFileInput() {
    if (currentImage) return;
    document.getElementById('fileInput').click();
  }
  function loadFile(e) {
    const file = e.target.files[0];
    if (file) loadBlob(file, file.name);
    e.target.value = '';
  }

  // ══ 載入 Blob ══
  function loadBlob(blob, name) {
    currentBlob = blob;
    currentType = blob.type || 'image/png';
    currentName = name.replace(/\.[^.]+$/, '') || 'image';
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      origW = img.naturalWidth;
      origH = img.naturalHeight;
      // 顯示預覽
      const preview = document.getElementById('previewImg');
      preview.src = url;
      preview.style.display = 'block';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('pasteZone').classList.add('has-image');
      document.getElementById('pasteZone').onclick = null;
      // 資訊列
      document.getElementById('imgDim').textContent = `${origW} × ${origH} px`;
      document.getElementById('imgType').textContent = currentType.replace('image/','').toUpperCase();
      document.getElementById('imgSize').textContent = formatSize(blob.size);
      document.getElementById('imgInfoBar').style.display = 'flex';
      // 縮放預設
      document.getElementById('resizeW').value = origW;
      document.getElementById('resizeH').value = origH;
      // 顯示工具列
      document.getElementById('toolbar').classList.add('visible');
      showToast('✅ 圖片已載入！', 'success');
    };
    img.src = url;
  }

  function clearImage(e) {
    e.stopPropagation();
    currentImage = null; currentBlob = null;
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('previewImg').src = '';
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('pasteZone').classList.remove('has-image');
    document.getElementById('pasteZone').onclick = triggerFileInput;
    document.getElementById('imgInfoBar').style.display = 'none';
    document.getElementById('toolbar').classList.remove('visible');
    document.getElementById('resultRow').classList.remove('visible');
    document.getElementById('resultRow').innerHTML = '';
  }

  // ══ 快速下載 ══
  function quickDownload() {
    if (!currentBlob) return;
    const ext = currentType.split('/')[1] || 'png';
    downloadBlob(currentBlob, `${currentName}.${ext}`);
    showToast('⬇️ 下載完成！', 'success');
  }

  // ══ 去背 ══
  function removeBG() {
    if (!currentImage) return;
    showProcessing('去背處理中…');
    setTimeout(() => {
      try {
        const threshold = parseInt(document.getElementById('thresholdRange').value);
        const canvas = document.getElementById('workCanvas');
        canvas.width  = origW;
        canvas.height = origH;
        const ctx = canvas.getContext('2d');

        // 填背景
        if (selectedBG !== 'transparent') {
          ctx.fillStyle = selectedBG;
          ctx.fillRect(0, 0, origW, origH);
        }
        ctx.drawImage(currentImage, 0, 0);

        const imgData = ctx.getImageData(0, 0, origW, origH);
        const d = imgData.data;

        // 取四個角落顏色做為背景色樣本
        const samples = [
          [d[0], d[1], d[2]],
          [d[(origW-1)*4], d[(origW-1)*4+1], d[(origW-1)*4+2]],
          [d[(origH-1)*origW*4], d[(origH-1)*origW*4+1], d[(origH-1)*origW*4+2]],
          [d[((origH-1)*origW+(origW-1))*4], d[((origH-1)*origW+(origW-1))*4+1], d[((origH-1)*origW+(origW-1))*4+2]],
        ];
        // 平均背景色
        const bgR = Math.round(samples.reduce((s,c)=>s+c[0],0)/samples.length);
        const bgG = Math.round(samples.reduce((s,c)=>s+c[1],0)/samples.length);
        const bgB = Math.round(samples.reduce((s,c)=>s+c[2],0)/samples.length);

        for (let i = 0; i < d.length; i += 4) {
          const dr = Math.abs(d[i]   - bgR);
          const dg = Math.abs(d[i+1] - bgG);
          const db = Math.abs(d[i+2] - bgB);
          const dist = Math.sqrt(dr*dr + dg*dg + db*db);
          if (dist < threshold) {
            if (selectedBG === 'transparent') {
              d[i+3] = 0;
            } else {
              const hex = selectedBG;
              d[i]   = parseInt(hex.slice(1,3),16);
              d[i+1] = parseInt(hex.slice(3,5),16);
              d[i+2] = parseInt(hex.slice(5,7),16);
            }
          }
        }
        ctx.putImageData(imgData, 0, 0);

        canvas.toBlob(blob => {
          hideProcessing();
          showResult('去背結果', blob, `${currentName}-nobg.png`);
        }, 'image/png');
      } catch(err) {
        hideProcessing();
        showToast('❌ 去背失敗：' + err.message, 'error');
      }
    }, 50);
  }

  // ══ 轉檔 ══
  function convertFormat() {
    if (!currentImage) return;
    const fmt = selectedFmt;
    const mimeMap = { png:'image/png', jpeg:'image/jpeg', webp:'image/webp', bmp:'image/bmp' };
    const mime = mimeMap[fmt] || 'image/png';
    const quality = parseInt(document.getElementById('qualityRange').value) / 100;
    showProcessing(`轉換為 ${fmt.toUpperCase()} 中…`);
    setTimeout(() => {
      const canvas = document.getElementById('workCanvas');
      canvas.width = origW; canvas.height = origH;
      const ctx = canvas.getContext('2d');
      if (fmt === 'jpeg') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,origW,origH); }
      ctx.drawImage(currentImage, 0, 0);
      canvas.toBlob(blob => {
        hideProcessing();
        showResult(`轉檔結果 (${fmt.toUpperCase()})`, blob, `${currentName}.${fmt}`);
      }, mime, quality);
    }, 50);
  }

  // ══ 縮放 ══
  function resizeAndDownload() {
    if (!currentImage) return;
    const w = parseInt(document.getElementById('resizeW').value) || origW;
    const h = parseInt(document.getElementById('resizeH').value) || origH;
    showProcessing('縮放中…');
    setTimeout(() => {
      const canvas = document.getElementById('workCanvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(currentImage, 0, 0, w, h);
      canvas.toBlob(blob => {
        hideProcessing();
        showResult(`縮放結果 (${w}×${h})`, blob, `${currentName}-${w}x${h}.png`);
      }, 'image/png');
    }, 50);
  }

  function syncResize(changed) {
    if (!lockRatio) return;
    const w = parseInt(document.getElementById('resizeW').value);
    const h = parseInt(document.getElementById('resizeH').value);
    if (changed === 'w' && w > 0) document.getElementById('resizeH').value = Math.round(w / origW * origH);
    if (changed === 'h' && h > 0) document.getElementById('resizeW').value = Math.round(h / origH * origW);
  }

  function setResizePercent(pct) {
    const w = Math.round(origW * pct / 100);
    const h = Math.round(origH * pct / 100);
    document.getElementById('resizeW').value = w;
    document.getElementById('resizeH').value = h;
  }

  function toggleLock() {
    lockRatio = !lockRatio;
    const btn = document.getElementById('lockBtn');
    btn.textContent = lockRatio ? '🔒' : '🔓';
    btn.classList.toggle('locked', lockRatio);
  }

  // ══ 結果預覽 ══
  function showResult(title, blob, filename) {
    const url = URL.createObjectURL(blob);
    const size = formatSize(blob.size);
    const row = document.getElementById('resultRow');
    row.classList.add('visible');
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-card-header">
        <span>${title}</span>
        <span style="color:var(--text3);">${size}</span>
      </div>
      <img src="${url}" alt="${title}">
      <div class="result-card-footer">
        <button class="btn btn-green btn-sm" style="flex:1;" onclick="downloadUrl('${url}','${filename}')">⬇️ 下載</button>
        <button class="btn btn-ghost btn-sm" onclick="useAsSource('${url}','${filename}')">📌 設為來源</button>
      </div>`;
    row.prepend(card);
    showToast(`✅ ${title} 完成！`, 'success');
  }

  function useAsSource(url, name) {
    fetch(url).then(r=>r.blob()).then(blob => {
      loadBlob(blob, name);
    });
  }

  // ══ 輔助 ══
  function selectBG(val, el) {
    selectedBG = val;
    document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  function selectFmt(fmt, el) {
    selectedFmt = fmt;
    document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const qualityRow = document.getElementById('qualityRow');
    qualityRow.style.display = (fmt === 'jpeg' || fmt === 'webp') ? 'flex' : 'none';
  }

  function downloadBlob(blob, name) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name; a.click();
  }

  function downloadUrl(url, name) {
    const a = document.createElement('a');
    a.href = url; a.download = name; a.click();
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(2) + ' MB';
  }

  function showProcessing(text) {
    document.getElementById('processingText').textContent = text;
    document.getElementById('processingOverlay').classList.add('show');
  }
  function hideProcessing() {
    document.getElementById('processingOverlay').classList.remove('show');
  }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // 初始化 qualityRow 顯示
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('qualityRow').style.display = 'none';
  });

  init();
</script>
</body>
</html>
